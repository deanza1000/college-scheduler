<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Orca | מערכת שיבוץ מערכות שעות חכמה</title>
    <meta name="description" content="תן לפרופסור למצוא את מערכת השעות האופטימלית עבורך. מערכת חכמה לבניית מערכת שעות לסטודנטים בקלות ובמהירות." />
    <meta property="og:title" content="Professor Orca | מערכת שיבוץ מערכות שעות חכמה" />
    <meta property="og:site_name" content="Professor Orca" />
    <meta property="og:description" content="תן לפרופסור למצוא את מערכת השעות האופטימלית עבורך. מערכת חכמה לבניית מערכת שעות לסטודנטים בקלות ובמהירות." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Rubik:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container">
        <header>
            <h1>Professor Orca</h1>
            <p>תן לפרופסור למצוא את מערכת השעות המושלמת עבורך בלחיצת כפתור</p>
        </header>

        <main>
            <section class="glass-panel form-section">
                <form id="schedule-form">
                    <div class="input-group row">
                        <div class="input-field">
                            <label for="year">שנה (לדוגמה: 2026)</label>
                            <input type="text" id="year" name="year" value="2026" required>
                        </div>
                        <div class="input-field">
                            <label for="semester">סמסטר</label>
                            <select id="semester" name="semester">
                                <option value="A">א'</option>
                                <option value="B" selected>ב'</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="course_ids">מספרי קורסים (מופרדים ברווח)</label>
                        <input type="text" id="course_ids" name="course_ids" placeholder="לדוגמה: 61776 61773 61179 61180 61763" value="61776 61773 61179 61180 61763" required>
                    </div>

                    <div class="input-group">
                        <label>ימים ללא לימודים (החרגה)</label>
                        <div class="checkbox-group">
                            <label class="checkbox-label"><input type="checkbox" name="exclude" value="א"> א'</label>
                            <label class="checkbox-label"><input type="checkbox" name="exclude" value="ב" checked> ב'</label>
                            <label class="checkbox-label"><input type="checkbox" name="exclude" value="ג" checked> ג'</label>
                            <label class="checkbox-label"><input type="checkbox" name="exclude" value="ד"> ד'</label>
                            <label class="checkbox-label"><input type="checkbox" name="exclude" value="ה"> ה'</label>
                            <label class="checkbox-label"><input type="checkbox" name="exclude" value="ו"> ו'</label>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="preferred_num_days">מספר ימי לימוד מועדף בקמפוס (אופציונלי)</label>
                        <input type="number" id="preferred_num_days" name="preferred_num_days" min="1" max="6" value="3">
                    </div>

                    <button type="submit" class="btn-primary" id="generate-btn">
                        <span class="btn-text">צור מערכת שעות</span>
                        <div class="spinner hidden" id="loading-spinner"></div>
                    </button>
                </form>
            </section>

            <section class="glass-panel results-section hidden" id="results-section">
                <h2>המערכת שלך</h2>
                <div id="warnings-container" class="warnings hidden"></div>
                <div class="schedule-container" id="schedule-container">
                    <!-- Schedule table will be injected here -->
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
