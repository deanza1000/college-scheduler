<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    .orca-character {
      animation: float 4s ease-in-out infinite;
    }
  </style>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orcaBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#bae6fd" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Soft drop shadow for the white outline to pop extra beautifully -->
    <filter id="outlineShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Subtle Glow -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGlow)" />

  <!-- Distinguished Wise Character Group -->
  <g class="orca-character" filter="url(#outlineShadow)">
    <!-- SOLID WHITE OUTLINE LAYER (Placed directly behind the character shapes) -->
    <g fill="#ffffff" stroke="#ffffff" stroke-width="22" stroke-linejoin="round" stroke-linecap="round">
      <!-- Tail silhouette -->
      <path d="M 80 400 C 40 380, 30 430, 45 460 C 80 445, 110 420, 130 400 Z" />
      <!-- Sleek Dorsal Fin -->
      <path d="M 240 220 C 240 100, 180 60, 150 50 C 175 110, 190 165, 200 220 Z" />
      <!-- Main Orca Body/Head -->
      <path d="M 110 400 C 80 270, 150 150, 280 150 C 420 150, 460 260, 460 340 C 460 430, 360 460, 270 460 C 180 460, 130 430, 110 400 Z" />
      <!-- Graduation Cap Outline -->
      <g transform="translate(300, 130) rotate(8)">
        <path d="M -35 0 L 35 0 L 30 18 L -30 18 Z" />
        <path d="M 0 -22 L 75 0 L 0 22 L -75 0 Z" />
      </g>
    </g>

    <!-- CHARACTER FILL & DETAIL LAYERS -->
    <!-- Tail silhouette in back -->
    <path d="M 80 400 C 40 380, 30 430, 45 460 C 80 445, 110 420, 130 400 Z" fill="#020617" />
    
    <!-- Sleek Dorsal Fin -->
    <path d="M 240 220 C 240 100, 180 60, 150 50 C 175 110, 190 165, 200 220 Z" fill="url(#orcaBody)" />

    <!-- Sleek Minimalist Orca Body/Head -->
    <path d="M 110 400 C 80 270, 150 150, 280 150 C 420 150, 460 260, 460 340 C 460 430, 360 460, 270 460 C 180 460, 130 430, 110 400 Z" fill="url(#orcaBody)" />

    <!-- Sleek Academic White Eyepatch -->
    <path d="M 330 200 C 370 190, 410 220, 420 250 C 425 265, 380 260, 350 240 C 330 225, 320 205, 330 200 Z" fill="#ffffff" opacity="0.9" />

    <!-- Clean Crisp White Belly -->
    <path d="M 170 440 C 220 460, 310 455, 390 410 C 370 380, 310 380, 260 390 C 210 400, 180 420, 170 440 Z" fill="#f8fafc" />

    <!-- Confident, Wise Eyes -->
    <circle cx="295" cy="280" r="10" fill="#ffffff" />
    <circle cx="297" cy="280" r="5" fill="#0f172a" />
    
    <circle cx="385" cy="280" r="10" fill="#ffffff" />
    <circle cx="387" cy="280" r="5" fill="#0f172a" />

    <!-- Confident Subtle Professorial Line Mouth -->
    <path d="M 335 330 C 350 335, 365 335, 380 328" fill="none" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round" />

    <!-- Sophisticated Professor Glasses (Browline / Thick Top Rim) -->
    <g>
      <!-- Left Lens Rim -->
      <rect x="260" y="250" width="60" height="50" rx="8" fill="url(#lensGrad)" stroke="#94a3b8" stroke-width="4" />
      <!-- Right Lens Rim -->
      <rect x="350" y="250" width="60" height="50" rx="8" fill="url(#lensGrad)" stroke="#94a3b8" stroke-width="4" />
      
      <!-- Classic Black Browline Top Rim -->
      <path d="M 255 255 C 275 245, 305 245, 325 255" fill="none" stroke="#334155" stroke-width="10" stroke-linecap="round" />
      <path d="M 345 255 C 365 245, 395 245, 415 255" fill="none" stroke="#334155" stroke-width="10" stroke-linecap="round" />

      <!-- Bridge -->
      <path d="M 320 262 L 350 262" fill="none" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" />
      
      <!-- Temples -->
      <path d="M 260 260 L 225 250" fill="none" stroke="#334155" stroke-width="6" stroke-linecap="round" />
      <path d="M 410 260 L 445 250" fill="none" stroke="#334155" stroke-width="6" stroke-linecap="round" />
    </g>

    <!-- Distinguished Classic Graduation / Scholar Cap -->
    <g transform="translate(300, 130) rotate(8)">
      <!-- Cap Base -->
      <path d="M -35 0 L 35 0 L 30 18 L -30 18 Z" fill="#1e293b" />
      <!-- Mortarboard Top -->
      <path d="M 0 -22 L 75 0 L 0 22 L -75 0 Z" fill="#334155" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
      <!-- Elegant Tassel -->
      <path d="M 0 0 L 48 18 L 50 45" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" />
      <!-- Tassel End -->
      <path d="M 47 45 L 53 45 L 55 55 L 45 55 Z" fill="#cbd5e1" />
      <!-- Button -->
      <circle cx="0" cy="0" r="5" fill="#cbd5e1" />
    </g>
  </g>
</svg>
